<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Logistica de Puertos y Aduanas RD</title>
  <meta name="theme-color" content="#1e3a5f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <link rel="manifest" href="/static/manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      height: 100%; background: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e2e8f0; display: flex; align-items: center; justify-content: center;
    }
    .box { width: 100%; max-width: 360px; padding: 0 24px; text-align: center; }
    .logo { font-size: 3.2rem; margin-bottom: 10px; }
    h1 { font-size: 1.05rem; font-weight: 700; color: #d4af37; line-height: 1.3; margin-bottom: 4px; }
    .sub { font-size: 0.7rem; color: #64748b; margin-bottom: 28px; }

    /* Role selector */
    .roles { display: flex; gap: 10px; margin-bottom: 22px; }
    .role-btn {
      flex: 1; padding: 12px 8px; border-radius: 14px; border: 2px solid #334155;
      background: #1e293b; color: #94a3b8; font-size: 0.78rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .role-btn .rico { font-size: 1.4rem; display: block; margin-bottom: 4px; }
    .role-btn.active { border-color: #d4af37; color: #d4af37; background: #162030; }

    .field-label {
      font-size: 0.65rem; font-weight: 700; color: #64748b;
      text-transform: uppercase; letter-spacing: 1px; text-align: left; margin-bottom: 6px;
    }
    .input-wrap { position: relative; margin-bottom: 18px; }
    input[type="password"], input[type="text"], input[type="email"] {
      width: 100%; background: #1e293b; border: 2px solid #334155;
      border-radius: 14px; color: #e2e8f0; font-size: 1.05rem;
      padding: 13px 46px 13px 16px; outline: none; transition: border-color 0.2s;
    }
    input[type="email"] { padding: 13px 16px; letter-spacing: normal; }
    input:focus { border-color: #d4af37; }
    .eye { position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
           background: none; border: none; font-size: 1.1rem; cursor: pointer; color: #64748b; }

    /* Email field for guest */
    #emailWrap { display: none; margin-bottom: 0; }

    .btn-login {
      width: 100%; background: linear-gradient(135deg, #d4af37, #b8962e);
      color: #0f172a; border: none; border-radius: 14px;
      padding: 14px; font-size: 0.95rem; font-weight: 700; cursor: pointer;
    }
    .btn-login:active { opacity: 0.8; }

    .error { background: #7f1d1d; border: 1px solid #ef4444; color: #fca5a5;
             border-radius: 10px; padding: 9px 14px; font-size: 0.78rem; margin-top: 14px; }

    .hint { margin-top: 12px; font-size: 0.68rem; color: #334155; }
    .register-link { margin-top: 18px; font-size: 0.75rem; color: #64748b; }
    .register-link a { color: #d4af37; text-decoration: none; font-weight: 600; }
    .footer { margin-top: 24px; font-size: 0.62rem; color: #1e293b; }
  </style>
</head>
<body>
<div class="box">
  <div class="logo">🔐</div>
  <h1>Logistica de Puertos<br>y Aduanas RD</h1>
  <div class="sub">Selecciona tu tipo de acceso</div>

  <form method="POST" action="/login">
    <input type="hidden" name="role" id="roleInput" value="admin">

    <div class="roles">
      <div class="role-btn active" id="btnAdmin" onclick="setRole('admin')">
        <span class="rico">👑</span>Administrador
      </div>
      <div class="role-btn" id="btnGuest" onclick="setRole('invitado')">
        <span class="rico">👤</span>Invitado
      </div>
    </div>

    <!-- Correo (invitados: obligatorio / admins creados en panel: opcional) -->
    <div id="emailWrap">
      <div class="field-label" id="emailLabel">Correo registrado</div>
      <div class="input-wrap">
        <input type="email" id="correoField" name="correo" placeholder="tu@correo.com" autocomplete="email">
      </div>
    </div>

    <div class="field-label">Contraseña</div>
    <div class="input-wrap">
      <input type="password" id="pwd" name="password" placeholder="••••••••" autocomplete="current-password" autofocus>
      <button type="button" class="eye" onclick="togglePwd()">👁</button>
    </div>

    <button type="submit" class="btn-login">Ingresar →</button>

    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <div class="hint" id="hint">Acceso completo al sistema</div>
  </form>

  <div class="register-link" id="registerLink" style="display:none;">
    ¿Primera vez? <a href="/registro">Regístrate aquí →</a>
  </div>

  <div class="footer">🔒 Acceso protegido</div>
</div>

<script>
  function setRole(r) {
    document.getElementById('roleInput').value = r;
    document.getElementById('btnAdmin').classList.toggle('active', r === 'admin');
    document.getElementById('btnGuest').classList.toggle('active', r === 'invitado');
    const correo = document.getElementById('correoField');
    if (r === 'admin') {
      document.getElementById('hint').textContent = 'Acceso completo al sistema';
      document.getElementById('emailWrap').style.display    = 'block';
      document.getElementById('emailLabel').textContent     = 'Correo (solo si eres admin creado en el panel)';
      document.getElementById('registerLink').style.display = 'none';
      correo.placeholder = 'Dejar vacío para acceso maestro';
      correo.required    = false;
    } else {
      document.getElementById('hint').textContent = 'Ingresa tu correo registrado y contraseña';
      document.getElementById('emailWrap').style.display    = 'block';
      document.getElementById('emailLabel').textContent     = 'Correo registrado';
      document.getElementById('registerLink').style.display = 'block';
      correo.placeholder = 'tu@correo.com';
      correo.required    = true;
    }
  }
  // Mostrar email desde el inicio
  setRole('admin');
  function togglePwd() {
    const f = document.getElementById('pwd');
    f.type = f.type === 'password' ? 'text' : 'password';
  }
</script>
</body>
</html>
