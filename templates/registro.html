<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Registro — Logistica de Puertos y Aduanas RD</title>
  <meta name="theme-color" content="#1e3a5f">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      min-height: 100%; background: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e2e8f0;
    }
    .wrap { max-width: 420px; margin: 0 auto; padding: 28px 22px 48px; }

    .logo-top { text-align: center; margin-bottom: 6px; font-size: 2.4rem; }
    h1 { text-align: center; font-size: 1.05rem; font-weight: 700; color: #d4af37; margin-bottom: 3px; }
    .sub { text-align: center; font-size: 0.7rem; color: #64748b; margin-bottom: 24px; }

    .card {
      background: #1e293b; border-radius: 20px; padding: 24px 20px; margin-bottom: 16px;
    }
    .card-title {
      font-size: 0.72rem; font-weight: 700; color: #d4af37;
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px;
      display: flex; align-items: center; gap: 7px;
    }

    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 0.65rem; font-weight: 700; color: #64748b;
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;
    }
    .field input, .field textarea, .field select {
      width: 100%; background: #0f172a; border: 2px solid #334155;
      border-radius: 12px; color: #e2e8f0; font-size: 0.92rem;
      padding: 11px 14px; outline: none; transition: border-color 0.2s;
      font-family: inherit;
    }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: #d4af37; }
    .field select option { background: #1e293b; }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .btn-reg {
      width: 100%; background: linear-gradient(135deg, #d4af37, #b8962e);
      color: #0f172a; border: none; border-radius: 14px;
      padding: 14px; font-size: 0.95rem; font-weight: 700; cursor: pointer;
      margin-top: 6px;
    }
    .btn-reg:active { opacity: 0.8; }

    .error { background: #7f1d1d; border: 1px solid #ef4444; color: #fca5a5;
             border-radius: 10px; padding: 9px 14px; font-size: 0.78rem; margin-bottom: 16px; }

    .login-link { text-align: center; margin-top: 16px; font-size: 0.75rem; color: #64748b; }
    .login-link a { color: #d4af37; text-decoration: none; font-weight: 600; }

    .required { color: #f87171; margin-left: 2px; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo-top">🚢</div>
  <h1>Logistica de Puertos y Aduanas RD</h1>
  <div class="sub">Crea tu cuenta de acceso</div>

  {% if error %}<div class="error">{{ error }}</div>{% endif %}

  <form method="POST" action="/registro">

    <!-- Datos personales -->
    <div class="card">
      <div class="card-title">👤 Datos personales</div>

      <div class="field">
        <label>Nombre completo <span class="required">*</span></label>
        <input type="text" name="nombre" placeholder="Ej. Juan Pérez García" required>
      </div>

      <div class="field">
        <label>Correo electrónico <span class="required">*</span></label>
        <input type="email" name="correo" placeholder="correo@ejemplo.com" required>
      </div>

      <div class="field">
        <label>Número de WhatsApp <span class="required">*</span></label>
        <input type="tel" name="whatsapp" placeholder="(809) 000-0000" required>
      </div>

      <div class="field">
        <label>Profesión <span class="required">*</span></label>
        <input type="text" name="profesion" placeholder="Ej. Agente Aduanal, Abogado, Importador..." required>
      </div>

      <div class="field">
        <label>¿A qué se dedica? <span class="required">*</span></label>
        <input type="text" name="dedicacion" placeholder="Describe brevemente tu actividad principal" required>
      </div>
    </div>

    <!-- Dirección -->
    <div class="card">
      <div class="card-title">📍 Dirección</div>

      <div class="field">
        <label>País <span class="required">*</span></label>
        <input type="text" name="pais" placeholder="Ej. República Dominicana" value="República Dominicana" required>
      </div>

      <div class="row2">
        <div class="field">
          <label>Provincia <span class="required">*</span></label>
          <input type="text" name="provincia" placeholder="Ej. Santo Domingo" required>
        </div>
        <div class="field">
          <label>Municipio <span class="required">*</span></label>
          <input type="text" name="municipio" placeholder="Ej. Distrito Nacional" required>
        </div>
      </div>

      <div class="row2">
        <div class="field">
          <label>Calle / Av.</label>
          <input type="text" name="calle" placeholder="Nombre de la calle">
        </div>
        <div class="field">
          <label>Número</label>
          <input type="text" name="numero" placeholder="No. 123">
        </div>
      </div>
    </div>

    <button type="submit" class="btn-reg">Registrarme y Acceder →</button>
  </form>

  <div class="login-link">
    ¿Ya tienes cuenta? <a href="/login">Inicia sesión aquí</a>
  </div>
</div>
</body>
</html>
